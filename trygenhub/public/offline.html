<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>You're offline | TryGenHub</title>
<style>
  html, body { height: 100%; margin: 0; }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0a0a0a;
    color: #f5f5f5;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    text-align: center;
    padding: 24px;
  }
  main { max-width: 28rem; }
  h1 { font-size: 1.5rem; margin: 0 0 0.75rem; }
  p { color: #a3a3a3; line-height: 1.5; margin: 0 0 1.5rem; }
  button {
    background: #f5f5f5;
    color: #0a0a0a;
    border: none;
    border-radius: 9999px;
    padding: 0.65rem 1.5rem;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
  }
  button:hover { opacity: 0.9; }
</style>
</head>
<body>
  <main>
    <h1>You're offline</h1>
    <p>This page isn't available without an internet connection. Pages you've already visited may still work from cache.</p>

  </main>

</html>
